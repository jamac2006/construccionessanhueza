# ========================================
# CONFIGURACIÓN DE DECAP CMS
# Construcciones Sanhueza - Versión principiante
# ========================================

# --- Conexión con GitHub ---
backend:
  name: github
  repo: jamac2006/construccionessanhueza
  branch: main  # ← cambia a "master" si tu rama principal se llama así

# --- Configuración de imágenes ---
media_folder: "imagenes"        # Dónde se GUARDAN las imágenes en GitHub
public_folder: "imagenes"       # Cómo se REFERENCIAN en el HTML
publish_mode: editorial_workflow  # Permite guardar como "borrador" antes de publicar

# --- Colección 1: Configuración general del sitio ---
collections:
  - name: "configuracion"
    label: "⚙️ Configuración"
    editor:
      preview: false
    files:
      - file: "_data/site.yml"
        label: "📋 Datos de Contacto y Textos"
        name: "site_config"
        description: "Edita aquí el teléfono, email, dirección y textos principales de tu sitio"
        fields:
          - label: "📱 Teléfono WhatsApp (con código de país)"
            name: "whatsapp"
            widget: "string"
            default: "+56912345678"
          - label: "✉️ Email de contacto"
            name: "email"
            widget: "string"
            default: "contacto@construccionessanhueza.cl"
          - label: "📍 Ubicación / Dirección"
            name: "location"
            widget: "string"
            default: "Puerto Montt, Chile"
          - label: "🏠 Texto Principal (Hero)"
            name: "hero_title"
            widget: "string"
            default: "Construcciones Sanhueza"
          - label: "Subtítulo Principal"
            name: "hero_subtitle"
            widget: "text"
            default: "Calidad y confianza en cada proyecto"
          - label: "Texto de Bienvenida"
            name: "welcome_text"
            widget: "text"
            default: "Somos una empresa dedicada a la construcción y remodelación..."

  # --- Colección 2: Servicios ---
  - name: "servicios"
    label: "🔧 Servicios"
    folder: "_data/servicios"
    create: true  # Permite crear nuevos servicios
    slug: "{{slug}}"  # Nombre del archivo automático
    extension: "yml"
    format: "yml"
    fields:
      - label: "Título del Servicio"
        name: "title"
        widget: "string"
        example: "Construcción de Casas"
      - label: "Descripción Corta"
        name: "description"
        widget: "text"
        example: "Construimos tu hogar desde los cimientos hasta el último detalle."
      - label: "Imagen (opcional)"
        name: "image"
        widget: "image"
        required: false
        hint: "Sube una foto representativa del servicio"
      - label: "Orden de aparición (1 = primero)"
        name: "order"
        widget: "number"
        default: 1
        min: 1
        max: 100

  # --- Colección 3: Proyectos / Galería ---
  - name: "proyectos"
    label: "🏗️ Proyectos"
    folder: "_data/proyectos"
    create: true
    slug: "{{slug}}"
    extension: "yml"
    format: "yml"
    fields:
      - label: "Nombre del Proyecto"
        name: "title"
        widget: "string"
        example: "Casa Familiar - Puerto Varas"
      - label: "Descripción"
        name: "description"
        widget: "text"
        example: "Construcción completa de vivienda unifamiliar de 120m²"
      - label: "Imagen Principal"
        name: "image"
        widget: "image"
        required: true
      - label: "Categoría"
        name: "category"
        widget: "select"
        options: ["Residencial", "Comercial", "Remodelación", "Otros"]
        default: "Residencial"
      - label: "Año de realización"
        name: "year"
        widget: "number"
        default: 2024
        min: 2000
        max: 2030
      - label: "¿Mostrar en portada?"
        name: "featured"
        widget: "boolean"
        default: false
