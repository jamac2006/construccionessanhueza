backend:
  name: github
  repo: jamac2006/construccionessanhueza
  branch: main

media_folder: "imagenes"
public_folder: "imagenes"
publish_mode: editorial_workflow

collections:
  - name: "configuracion"
    label: "Configuracion"
    editor:
      preview: false
    files:
      - file: "_data/site.yml"
        label: "Datos de Contacto"
        name: "site_config"
        fields:
          - { label: "Telefono WhatsApp", name: "whatsapp", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Ubicacion", name: "location", widget: "string" }

  - name: "servicios"
    label: "Servicios"
    folder: "_data/servicios"
    create: true
    slug: "{{slug}}"
    extension: "yml"
    format: "yml"
    fields:
      - { label: "Titulo", name: "title", widget: "string" }
      - { label: "Descripcion", name: "description", widget: "text" }
      - { label: "Imagen", name: "image", widget: "image", required: false }

  - name: "proyectos"
    label: "Proyectos"
    folder: "_data/proyectos"
    create: true
    slug: "{{slug}}"
    extension: "yml"
    format: "yml"
    fields:
      - { label: "Nombre", name: "title", widget: "string" }
      - { label: "Descripcion", name: "description", widget: "text" }
      - { label: "Imagen", name: "image", widget: "image", required: true }
