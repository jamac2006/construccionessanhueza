backend:
  name: github
  repo: jamac2006/construccionessanhueza
  branch: main

media_folder: "imagenes"
public_folder: "imagenes"

collections:
  - name: "configuracion"
    label: "Configuracion"
    files:
      - file: "_data/site.yml"
        label: "Datos de Contacto"
        name: "site"
        fields:
          - { label: "Telefono", name: "telefono", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Direccion", name: "direccion", widget: "string" }

  - name: "servicios"
    label: "Servicios"
    folder: "_data/servicios"
    create: true
    slug: "{{slug}}"
    extension: "yml"
    format: "yml"
    fields:
      - { label: "Titulo", name: "titulo", widget: "string" }
      - { label: "Descripcion", name: "descripcion", widget: "text" }
      - { label: "Imagen", name: "imagen", widget: "image", required: false }

  - name: "proyectos"
    label: "Proyectos"
    folder: "_data/proyectos"
    create: true
    slug: "{{slug}}"
    extension: "yml"
    format: "yml"
    fields:
      - { label: "Nombre", name: "nombre", widget: "string" }
      - { label: "Descripcion", name: "descripcion", widget: "text" }
      - { label: "Imagen", name: "imagen", widget: "image", required: true }
