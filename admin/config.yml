backend:
  name: github
  repo: jamac2006/construccionessanhueza
  branch: main

media_folder: "imagenes"
public_folder: "imagenes"
publish_mode: editorial_workflow

collections:
  - name: "configuracion"
    label: "Configuracion"
    editor:
      preview: false
    files:
      - file: "_data/site.yml"
        label: "Datos de Contacto"
        name: "site_config"
        fields:
          - { label: "Telefono WhatsApp", name: "whatsapp", widget: "string", default: "+56912345678" }
          - { label: "Email", name: "email", widget: "string", default: "contacto@construccionessanhueza.cl" }
          - { label: "Ubicacion", name: "location", widget: "string", default: "Puerto Montt, Chile" }
          - { label: "Titulo Principal", name: "hero_title", widget: "string", default: "Construcciones Sanhueza" }
          - { label: "Subtitulo", name: "hero_subtitle", widget: "text", default: "Calidad y confianza" }
          - { label: "Texto Bienvenida", name: "welcome_text", widget: "text", default: "Bienvenidos" }

  - name: "servicios"
    label: "Servicios"
    folder: "_data/servicios"
    create: true
    slug: "{{slug}}"
    extension: "yml"
    format: "yml"
    fields:
      - { label: "Titulo", name: "title", widget: "string" }
      - { label: "Descripcion", name: "description", widget: "text" }
      - { label: "Imagen", name: "image", widget: "image", required: false }
      - { label: "Orden", name: "order", widget: "number", default: 1 }

  - name: "proyectos"
    label: "Proyectos"
    folder: "_data/proyectos"
    create: true
    slug: "{{slug}}"
    extension: "yml"
    format: "yml"
    fields:
      - { label: "Nombre", name: "title", widget: "string" }
      - { label: "Descripcion", name: "description", widget: "text" }
      - { label: "Imagen", name: "image", widget: "image", required: true }
      - { label: "Categoria", name: "category", widget: "select", options: ["Residencial", "Comercial", "Remodelacion"] }
      - { label: "Año", name: "year", widget: "number", default: 2024 }
      - { label: "Destacado", name: "featured", widget: "boolean", default: false }
