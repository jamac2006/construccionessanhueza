<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel - Construcciones Sanhueza</title>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <style>
    body { 
      font-family: system-ui, sans-serif; 
      margin: 0; 
      padding: 2rem;
      background: #f0f4f8;
    }
    #status {
      max-width: 600px;
      margin: 2rem auto;
      padding: 1.5rem;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .success { color: #059669; border-left: 4px solid #059669; }
    .error { color: #dc2626; border-left: 4px solid #dc2626; }
    .loading { color: #2563eb; border-left: 4px solid #2563eb; }
    h2 { margin: 0 0 0.5rem; font-size: 1.25rem; }
    p { margin: 0.25rem 0; color: #6b7280; }
    code { background: #f3f4f6; padding: 0.125rem 0.375rem; border-radius: 4px; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div id="status">
    <h2 class="loading">⏳ Cargando Decap CMS...</h2>
    <p>Si ves esto por más de 10 segundos, revisa la consola (F12)</p>
  </div>

  <script>
    // Verificar que Decap CMS se cargó
    if (typeof window.CMS === 'undefined') {
      document.getElementById('status').innerHTML = `
        <h2 class="error">❌ Error: Decap CMS no se cargó</h2>
        <p>Verifica tu conexión a internet o recarga la página (Ctrl+F5)</p>
      `;
    } else {
      // Inicializar cuando el DOM esté listo
      document.addEventListener('DOMContentLoaded', function() {
        try {
          // El CMS se auto-inicializa, solo esperamos un momento
          setTimeout(function() {
            const status = document.getElementById('status');
            if (status && document.body.children.length <= 2) {
              status.innerHTML = `
                <h2 class="success">✅ CMS Cargado</h2>
                <p>El panel debería aparecer arriba. Si no, revisa la consola.</p>
                <p style="margin-top: 1rem; font-size: 0.875rem;">
                  Archivos verificados:<br>
                  • <code>admin/config.yml</code><br>
                  • <code>admin/index.html</code>
                </p>
              `;
            }
          }, 3000);
        } catch (e) {
          document.getElementById('status').innerHTML = `
            <h2 class="error">❌ Error al inicializar</h2>
            <p>${e.message}</p>
            <p style="margin-top: 0.5rem; font-size: 0.875rem;">Revisa la consola (F12) para más detalles</p>
          `;
        }
      });
    }
  </script>
</body>
</html>
